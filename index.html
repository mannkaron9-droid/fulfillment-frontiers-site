<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fulfillment Frontiers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* 🔥 Animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    120deg,
    rgba(255,215,0,0.05) 0px,
    rgba(255,215,0,0.05) 2px,
    transparent 2px,
    transparent 60px
  );
  animation: moveBg 20s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

.container {
  padding: 60px 20px;
}

/* LOGO */
.logo {
  max-width: 300px;
  filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
  transition: 0.3s;
}
.logo:hover {
  transform: scale(1.05);
}

h1 {
  font-size: 44px;
  font-weight: 800;
  letter-spacing: 2px;
}

p {
  color: #ccc;
  font-size: 18px;
}

.btn {
  background: #FFD700;
  color: black;
  padding: 15px 30px;
  margin-top: 25px;
  display: inline-block;
  text-decoration: none;
  font-weight: bold;
  border-radius: 6px;
  transition: 0.3s;
  cursor: pointer;
}
.btn:hover {
  transform: scale(1.05);
  background: #e6c200;
}

.section {
  margin-top: 80px;
}

.divider {
  width: 60px;
  height: 3px;
  background: #FFD700;
  margin: 20px auto;
}

/* SERVICES GRID */
.services {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

/* FORM */
input, button {
  width: 90%;
  max-width: 400px;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}
input {
  background: #111;
  color: white;
}

/* 🔥 POPUP MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 10;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #111;
  margin: 10% auto;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  text-align: center;
}

.close {
  float: right;
  font-size: 22px;
  cursor: pointer;
  color: #aaa;
}

.close:hover {
  color: white;
}

a {
  color: #00aaff;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <!-- HERO -->
  <h1>FAST. RELIABLE. UNSTOPPABLE.</h1>
  <div class="divider"></div>
  <p>Same-Day Delivery • Last-Mile Logistics • Scheduled Routes</p>

  <div>
    <a href="tel:2673388160" class="btn">Call Now</a>
    <button class="btn" onclick="openModal()">Get Quote</button>
  </div>

  <!-- SERVICES -->
  <div class="section">
    <h2>Services</h2>
    <div class="divider"></div>

    <div class="services">
      <div class="card">Same-Day Delivery</div>
      <div class="card">Scheduled Routes</div>
      <div class="card">Last-Mile Logistics</div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section">
    <h2>Contact</h2>
    <div class="divider"></div>

    <p><a href="tel:2673388160">267-338-8160</a></p>
    <p>fulfillmentfrontiersbookings@gmail.com</p>
  </div>

</div>

<!-- 🔥 MODAL -->
<div id="quoteModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>Request a Quote</h2>

    <form name="quote" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="quote">

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="text" name="details" placeholder="Delivery Details" required>

      <button type="submit" class="btn">Submit</button>
    </form>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("quoteModal").style.display = "block";
}

function closeModal() {
  document.getElementById("quoteModal").style.display = "none";
}

window.onclick = function(event) {
  let modal = document.getElementById("quoteModal");
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
