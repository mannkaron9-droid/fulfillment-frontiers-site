<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fulfillment Frontiers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    img {
      max-width: 220px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      margin: 10px 0;
    }

    p {
      font-size: 18px;
      color: #ccc;
    }

    .btn {
      background: #FFD700;
      color: black;
      padding: 15px 25px;
      border: none;
      font-weight: bold;
      margin-top: 20px;
      display: inline-block;
      text-decoration: none;
    }

    .section {
      margin-top: 50px;
    }

    input, button {
      width: 90%;
      max-width: 400px;
      padding: 12px;
      margin: 10px 0;
      border: none;
    }

    input {
      background: #111;
      color: white;
    }

    button {
      background: #FFD700;
      font-weight: bold;
    }

    a {
      color: #00aaff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- LOGO -->
    <img src="logo.png" alt="Fulfillment Frontiers Logo">

    <!-- HERO -->
    <h1>FAST. RELIABLE. UNSTOPPABLE.</h1>
    <p>Same-Day Delivery • Last-Mile Logistics • Scheduled Routes</p>

    <a href="tel:2673388160" class="btn">Call Now</a>

    <!-- SERVICES -->
    <div class="section">
      <h2>Services</h2>
      <p>Same-Day Delivery</p>
      <p>Scheduled Routes</p>
      <p>Last-Mile Logistics</p>
    </div>

    <!-- CONTACT -->
    <div class="section">
      <h2>Contact</h2>
      <p><a href="tel:2673388160">267-338-8160</a></p>
      <p>fulfillmentfrontiersbookings@gmail.com</p>

      <!-- BOOKING FORM -->
      <form name="booking" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="booking">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <input type="text" name="service" placeholder="Type of Delivery" required>

        <button type="submit">Request Booking</button>
      </form>

    </div>

  </div>

</body>
</html>
