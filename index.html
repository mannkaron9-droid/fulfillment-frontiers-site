<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fulfillment Frontiers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

<!-- Stripe -->
<script src="https://js.stripe.com/v3/"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* Animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    120deg,
    rgba(255,215,0,0.05) 0px,
    rgba(255,215,0,0.05) 2px,
    transparent 2px,
    transparent 60px
  );
  animation: moveBg 20s linear infinite;
  z-index: -1;
}
@keyframes moveBg {
  to { transform: translate(-200px,-200px); }
}

.container { padding: 50px 20px; }

.logo {
  max-width: 280px;
  filter: drop-shadow(0 0 15px gold);
}

.btn {
  background: gold;
  padding: 15px 25px;
  margin: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.section { margin-top: 70px; }

input {
  width: 90%;
  max-width: 400px;
  padding: 12px;
  margin: 10px;
  background: #111;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>FAST. RELIABLE. UNSTOPPABLE.</h1>
<p>Same-Day Delivery • Last-Mile Logistics • Scheduled Routes</p>

<button class="btn" onclick="openModal()">Get Quote</button>
<a href="tel:2673388160" class="btn">Call Now</a>

<!-- 🚀 AUTO PRICE -->
<div class="section">
<h2>Instant Quote</h2>

<input id="pickup" placeholder="Pickup Address">
<input id="dropoff" placeholder="Dropoff Address">

<button class="btn" onclick="getDistance()">Calculate Price</button>

<p id="priceResult"></p>
</div>

<!-- 📅 BOOKING -->
<div class="section">
<h2>Book Delivery</h2>

<form name="booking" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="booking">

<input type="text" name="name" placeholder="Your Name" required>
<input type="datetime-local" name="date" required>
<input type="text" name="pickup" placeholder="Pickup Address" required>
<input type="text" name="dropoff" placeholder="Dropoff Address" required>

<button class="btn">Schedule</button>
</form>
</div>

<!-- 🔐 LOGIN -->
<div class="section">
<h2>Customer Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
</div>

<!-- 🚚 TRACKING -->
<div class="section">
<h2>Track Driver</h2>

<iframe width="90%" height="300"
style="border-radius:10px"
src="https://www.google.com/maps?q=New%20Jersey&output=embed">
</iframe>
</div>

<!-- 💳 PAYMENT -->
<div class="section">
<h2>Payment</h2>

<button class="btn" onclick="payNow()">Pay Now</button>
</div>

</div>

<!-- MODAL -->
<div id="quoteModal" style="display:none;position:fixed;width:100%;height:100%;background:black;">
<div style="margin:100px auto;background:#111;padding:20px;width:90%;max-width:400px;">
<h2>Request Quote</h2>

<form name="quote" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="quote">

<input type="text" name="name" placeholder="Name">
<input type="tel" name="phone" placeholder="Phone">
<input type="text" name="details" placeholder="Details">

<button class="btn">Submit</button>
</form>

<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
function openModal(){document.getElementById("quoteModal").style.display="block";}
function closeModal(){document.getElementById("quoteModal").style.display="none";}

// 🚀 Google Distance
function getDistance() {
  let service = new google.maps.DistanceMatrixService();

  service.getDistanceMatrix({
    origins: [document.getElementById("pickup").value],
    destinations: [document.getElementById("dropoff").value],
    travelMode: 'DRIVING',
  }, function(response) {

    let distanceText = response.rows[0].elements[0].distance.text;
    let miles = parseFloat(distanceText.replace(" mi",""));

    let price = (miles * 2) + 10;

    document.getElementById("priceResult").innerText =
      distanceText + " → $" + price.toFixed(2);
  });
}

// 🔐 LOGIN (placeholder)
function login(){
  alert("Connect Firebase to enable login");
}

// 💳 STRIPE (placeholder)
function payNow(){
  alert("Connect Stripe backend to enable payments");
}
</script>

</body>
</html>
